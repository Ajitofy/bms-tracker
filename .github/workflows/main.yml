name: BMS Lightweight TEST

on:
  workflow_dispatch:
  schedule:
    - cron: "* * * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install requests
        run: pip install requests

      - name: Test check
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python <<EOF
          import requests

          URL = "https://in.bookmyshow.com/sports/icc-men-s-t20-world-cup-2026-semi-final-2/ET00474271"

          headers = {
              "User-Agent": "Mozilla/5.0 (Linux; Android 10; Mobile) AppleWebKit/537.36 Chrome/120 Safari/537.36"
          }

          r = requests.get(URL, headers=headers, timeout=30)
          text = r.text

          print("===== PAGE CONTAINS =====")
          print("Coming Soon" in text)
          print("Book Now" in text)
          print("Click to reveal" in text)
          print("========================")
          EOF
