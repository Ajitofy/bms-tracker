name: BMS Playwright 30hr Stable Monitor

on:
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 1800   # 30 hours max

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install --with-deps

      - name: Run monitoring loop
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python <<EOF
          import asyncio
          import requests
          import os
          import time
          from playwright.async_api import async_playwright

          BOT_TOKEN = os.environ["BOT_TOKEN"]
          CHAT_ID = os.environ["CHAT_ID"]

          URL = "https://in.bookmyshow.com/sports/icc-men-s-t20-world-cup-2026-semi-final-2/ET00474271"

          def send(msg):
              requests.post(
                  f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage",
                  data={"chat_id": CHAT_ID, "text": msg}
              )

          async def monitor():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  context = await browser.new_context(
                      locale="en-IN",
                      user_agent="Mozilla/5.0 (Linux; Android 10; Mobile) AppleWebKit/537.36 Chrome/120 Safari/537.36",
                      viewport={"width": 390, "height": 844}
                  )

                  page = await context.new_page()

                  strike_count = 0
                  check_count = 0

                  while True:
                      check_count += 1
                      print(f"\n===== CHECK #{check_count} =====", flush=True)

                      try:
                          await page.goto(URL, timeout=30000)
                          await page.wait_for_timeout(5000)
                          body_text = await page.inner_text("body")

                          if "Coming Soon" in body_text:
                              print("Status: Coming Soon still present", flush=True)
                              strike_count = 0
                          else:
                              strike_count += 1
                              print(f"Possible change detected (strike {strike_count})", flush=True)

                              if strike_count >= 3:
                                  print("🚨 CONFIRMED BOOKING OPEN", flush=True)
                                  send("🔥 BOOKING OPEN for Semi Final 2! Check immediately!")
                                  break

                      except Exception as e:
                          print("Error during check:", e, flush=True)

                      await asyncio.sleep(25)

                  await browser.close()

          asyncio.run(monitor())
          EOF
