name: BMS Final Stable Monitor

on:
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 1800   # 30 hours max

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install --with-deps

      - name: Run monitor
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python <<EOF
          import asyncio
          import requests
          import os
          from playwright.async_api import async_playwright

          BOT_TOKEN = os.environ["BOT_TOKEN"]
          CHAT_ID = os.environ["CHAT_ID"]

          URL = "https://in.bookmyshow.com/sports/icc-men-s-t20-world-cup-2026-semi-final-2/ET00474271"

          def send(msg):
              requests.post(
                  f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage",
                  data={"chat_id": CHAT_ID, "text": msg}
              )

          async def monitor():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  context = await browser.new_context(
                      locale="en-IN",
                      user_agent="Mozilla/5.0 (Linux; Android 10; Mobile) AppleWebKit/537.36 Chrome/120 Safari/537.36",
                      viewport={"width": 390, "height": 844}
                  )

                  page = await context.new_page()

                  strike_count = 0
                  check_count = 0

                  while True:
                      check_count += 1
                      print(f"\n===== CHECK #{check_count} =====", flush=True)

                      try:
                          await page.goto(URL, timeout=30000)
                          await page.wait_for_timeout(5000)

                          # Detect booking buttons
                          login_btn = page.locator("button:has-text('Login to book')")
                          book_btn = page.locator("button:has-text('Book Now')")

                          login_count = await login_btn.count()
                          book_count = await book_btn.count()

                          body_text = await page.inner_text("body")
                          coming_present = "Coming Soon" in body_text

                          print("Login button count:", login_count, flush=True)
                          print("Book Now count:", book_count, flush=True)
                          print("Coming Soon present:", coming_present, flush=True)

                          if (login_count > 0 or book_count > 0) and not coming_present:
                              strike_count += 1
                              print(f"Possible OPEN detected (strike {strike_count})", flush=True)

                              if strike_count >= 3:
                                  print("🚨 CONFIRMED BOOKING OPEN", flush=True)
                                  send("🔥 BOOKING OPEN for Semi Final 2! Check immediately!")
                                  break
                          else:
                              strike_count = 0
                              print("Status: Still NOT open", flush=True)

                      except Exception as e:
                          print("Error during check:", e, flush=True)

                      await asyncio.sleep(25)

                  await browser.close()

          asyncio.run(monitor())
          EOF
