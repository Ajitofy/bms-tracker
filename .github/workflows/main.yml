name: BMS Playwright Diagnostic

on:
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install --with-deps

      - name: Run diagnostic
        run: |
          python <<EOF
          import asyncio
          from playwright.async_api import async_playwright

          URL = "https://in.bookmyshow.com/sports/icc-men-s-t20-world-cup-2026-semi-final-2/ET00474271"

          async def check():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)

                  context = await browser.new_context(
                      locale="en-IN",
                      user_agent="Mozilla/5.0 (Linux; Android 10; Mobile) AppleWebKit/537.36 Chrome/120 Safari/537.36",
                      viewport={"width": 390, "height": 844}
                  )

                  page = await context.new_page()
                  await page.goto(URL, timeout=60000)
                  await page.wait_for_timeout(8000)

                  await page.evaluate("window.scrollTo(0, document.body.scrollHeight)")
                  await page.wait_for_timeout(3000)

                  body_text = await page.inner_text("body")

                  print("===== PAGE TEXT START =====")
                  print(body_text)
                  print("===== PAGE TEXT END =====")

                  await browser.close()

          asyncio.run(check())
          EOF
