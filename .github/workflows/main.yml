name: BookMyShow Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # 5h 50m safe under 6h cap

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run monitor
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python <<EOF
          import requests
          import time
          import os
          from bs4 import BeautifulSoup

          URL = "https://in.bookmyshow.com/sports/icc-men-s-t20-world-cup-2026-semi-final-2/ET00474271"

          BOT_TOKEN = os.environ["BOT_TOKEN"]
          CHAT_ID = os.environ["CHAT_ID"]

          end_time = time.time() + (350 * 60)  # ~5h50m

          def notify(msg):
              requests.get(
                  f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage",
                  params={"chat_id": CHAT_ID, "text": msg}
              )

          last_state = None

          while time.time() < end_time:
              r = requests.get(URL, headers={"User-Agent": "Mozilla/5.0"})
              soup = BeautifulSoup(r.text, "html.parser")

              button = soup.find("button")
              current = button.text.strip() if button else "NO_BUTTON"

              print("Current:", current)

              if last_state and current != last_state:
                  notify(f"🚨 Button changed to: {current}")
                  break

              last_state = current
              time.sleep(30)
          EOF
