name: BookMyShow Monitor

on:
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 2160   # 36 hours

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python <<EOF
          import requests
          import time
          import os

          URL = "https://in.bookmyshow.com/sports/icc-men-s-t20-world-cup-2026-semi-final-2/ET00474271"

          BOT_TOKEN = os.environ["BOT_TOKEN"]
          CHAT_ID = os.environ["CHAT_ID"]

          last_state = None
          end_time = time.time() + (36 * 60 * 60)

          def notify(msg):
              requests.get(
                  f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage",
                  params={"chat_id": CHAT_ID, "text": msg}
              )

          while time.time() < end_time:
              r = requests.get(URL, headers={"User-Agent": "Mozilla/5.0"})
              text = r.text

              if last_state and "Coming Soon" not in text:
                  notify("🚨 BookMyShow button changed!")
                  break

              last_state = text
              time.sleep(30)
          EOF
