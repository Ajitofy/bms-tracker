name: BMS Lightweight TEST

on:
  workflow_dispatch:
  schedule:
    - cron: "* * * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install requests
        run: pip install requests

      - name: Test check
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python <<EOF
          import requests

          URL = "https://in.bookmyshow.com/sports/icc-men-s-t20-world-cup-2026-semi-final-2/ET00474271"

          headers = {
              "User-Agent": "Mozilla/5.0 (Linux; Android 10; Mobile) AppleWebKit/537.36 Chrome/120 Safari/537.36"
          }

          r = requests.get(URL, headers=headers, timeout=30)
          text = r.text

          print("===== PAGE CONTAINS =====")
          print("Coming Soon" in text)
          print("Book Now" in text)
          print("Click to reveal" in text)
          print("========================")
          EOF                  context = await browser.new_context(
                      locale="en-IN",
                      user_agent="Mozilla/5.0 (Linux; Android 10; Mobile) AppleWebKit/537.36 Chrome/120 Safari/537.36",
                      viewport={"width": 390, "height": 844}
                  )

                  page = await context.new_page()
                  await page.goto(URL, timeout=60000)
                  await page.wait_for_timeout(8000)

                  await page.evaluate("window.scrollTo(0, document.body.scrollHeight)")
                  await page.wait_for_timeout(3000)

                  body_text = await page.inner_text("body")

                  print("===== PAGE TEXT START =====")
                  print(body_text)
                  print("===== PAGE TEXT END =====")

                  await browser.close()

          asyncio.run(check())
          EOF
